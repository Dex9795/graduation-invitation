<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thư Mời Lễ Tốt Nghiệp</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-1: #031226;
      --bg-2: #123f6f;
      --bg-3: #1f6a9a;
      --ink: #ecf8ff;
      --danger: #ffb4b4;
      --input-bg: rgba(255, 255, 255, 0.08);
      --input-border: rgba(186, 243, 255, 0.46);
      --glass: rgba(14, 55, 96, 0.38);
      --glass-deep: rgba(8, 34, 66, 0.58);
      --glass-border: rgba(183, 240, 255, 0.32);
      --shadow: 0 24px 60px rgba(0, 12, 31, 0.48);
      --radius: 24px;
      --ease-liquid: cubic-bezier(0.22, 1, 0.36, 1);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    html {
      scroll-behavior: smooth;
      scroll-snap-type: y mandatory;
    }

    body {
      font-family: "Be Vietnam Pro", "Segoe UI", sans-serif;
      color: var(--ink);
      overflow-x: hidden;
      background-color: #031226; /* Màu nền dự phòng trong lúc chờ load video */
    }

    /* CSS cho Background Video */
    .bg-video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      z-index: -2;
      pointer-events: none; /* Không cho người dùng tương tác với video */
    }

    /* Lớp phủ tối mờ để chữ và thiệp nổi bật hơn trên nền video */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(3, 18, 38, 0); /* Độ mờ 50%, bạn có thể chỉnh số 0.5 này */
      pointer-events: none;
      z-index: -1;
    }

    .page {
      position: relative;
      z-index: 1;
      width: min(1120px, 100%);
      margin: 0 auto;
      padding: 12px 14px 32px;
    }

    body.invite-centered .page {
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: 12px 14px;
    }

    .hero {
      position: relative;
      isolation: isolate;
      min-height: auto;
      width: min(94vw, 430px);
      margin-inline: auto;
      display: grid;
      align-content: start;
      justify-items: center;
      text-align: center;
      gap: 14px;
      padding: clamp(22px, 5vw, 34px) clamp(18px, 4vw, 26px) 0.5cm;
      border-radius: 26px;
      border: 1px solid rgba(186, 243, 255, 0.24);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      background:
        linear-gradient(145deg, rgba(99, 102, 241, 0.25), rgba(168, 85, 247, 0.18)),
        linear-gradient(160deg, rgba(30, 41, 99, 0.75), rgba(76, 29, 149, 0.75));
      backdrop-filter: blur(18px) saturate(140%);
      -webkit-backdrop-filter: blur(18px) saturate(140%);
      transition: min-height 0.45s ease, padding 0.45s ease;
      scroll-snap-align: start;
      scroll-snap-stop: always;
    }

    body.invite-centered .hero {
      margin: 0;
      align-content: center;
    }

    .hero::before,
    .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      pointer-events: none;
      z-index: -1;
    }

    .hero::before {
      border: 1px solid rgba(240, 252, 255, 0.22);
      box-shadow: inset 0 1px 0 rgba(240, 252, 255, 0.25), inset 0 -16px 35px rgba(4, 24, 54, 0.28);
    }

    .hero.opened {
      min-height: auto;
      padding-top: clamp(18px, 4vw, 30px);
      padding-bottom: 0.5cm;
    }

    body.keyboard-open .hero {
      min-height: auto;
      align-content: start;
      padding-top: clamp(12px, 4svh, 28px);
    }

    body.keyboard-open .hero-title {
      font-size: clamp(1.55rem, 6.2vw, 2.45rem);
    }

    .hero > * {
      position: relative;
      z-index: 2;
    }

    .hero-title {
      margin: 0;
      max-width: 15ch;
      font-size: clamp(1.8rem, 7.2vw, 3.5rem);
      line-height: 1.12;
      font-weight: 800;
      letter-spacing: 0.1px;
      text-wrap: balance;
      background: linear-gradient(95deg, #f7feff 0%, #84eaff 45%, #b7fcff 76%, #f3ffff 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      filter: drop-shadow(0 8px 24px rgba(0, 0, 0, 0.42));
    }

    .invite-form {
      width: 90%;
      max-width: 350px;
      display: grid;
      gap: 10px;
      margin-bottom: 0.5cm;
      transition: opacity 0.35s ease, transform 0.35s ease;
    }

    .input {
      width: 100%;
      height: 50px;
      border-radius: 16px;
      border: 1px solid var(--input-border);
      background: var(--input-bg);
      box-shadow: inset 0 1px 0 rgba(214, 248, 255, 0.18), 0 14px 26px rgba(6, 22, 44, 0.26);
      backdrop-filter: blur(10px);
      color: var(--ink);
      font-size: 16px;
      padding: 0 14px;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
      scroll-margin-block: 16svh;
    }

    .input::placeholder {
      color: #b6d8e9;
    }

    .input:focus {
      border-color: rgba(206, 249, 255, 0.86);
      box-shadow: inset 0 1px 0 rgba(229, 251, 255, 0.38), 0 0 0 3px rgba(124, 228, 255, 0.27);
      transform: translateY(-1px);
    }

    .button {
      width: 100%;
      height: 50px;
      border: none;
      border-radius: 16px;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 700;
      color: #052346;
      background: linear-gradient(95deg, #78dcff, #b7f6ff 58%, #ddffff);
      box-shadow: 0 12px 26px rgba(7, 32, 66, 0.28), inset 0 1px 0 rgba(255, 255, 255, 0.42);
      transition: transform 0.12s ease, filter 0.2s ease;
    }

    .button:hover {
      filter: brightness(1.03);
    }

    .button:active {
      transform: translateY(1px);
    }

    .error {
      min-height: 22px;
      margin: 2px 0 0;
      font-size: 0.94rem;
      color: var(--danger);
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.35);
    }

    .hidden {
      display: none !important;
    }

    .reveal {
      margin-top: 18px;
      opacity: 0;
      transform: translateY(24px) scale(0.99);
      transition: opacity 0.56s ease, transform 0.56s ease;
    }

    .reveal.show {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    .story-track {
      display: grid;
      gap: 0;
    }

    .story-slide {
      min-height: 100svh;
      display: grid;
      place-items: center;
      padding: clamp(8px, 2svh, 24px) 0;
      scroll-snap-align: center;
      scroll-snap-stop: always;
    }

    .story-card {
      width: auto;
      max-width: min(96vw, 1020px);
      max-height: calc(100svh - clamp(16px, 4svh, 48px));
      border-radius: clamp(18px, 2.8vw, 30px);
      border: 1px solid var(--glass-border);
      background: linear-gradient(150deg, rgba(18, 70, 121, 0.44), rgba(11, 52, 96, 0.6));
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px) saturate(130%);
      -webkit-backdrop-filter: blur(14px) saturate(130%);
      overflow: hidden;
      transform-origin: center top;
      will-change: transform, opacity;
      contain: layout paint;
      transition: border-radius 0.35s var(--ease-liquid), box-shadow 0.35s var(--ease-liquid);
    }

    .story-slide.is-active .story-card {
      box-shadow: 0 28px 70px rgba(0, 15, 34, 0.55), inset 0 1px 0 rgba(242, 253, 255, 0.16);
    }

    .story-card img {
      width: auto;
      height: auto;
      max-width: min(96vw, 1020px);
      max-height: calc(100svh - clamp(16px, 4svh, 48px));
      display: block;
      object-fit: contain;
      object-position: center;
      border-radius: inherit;
      background: rgba(4, 22, 46, 0.62);
    }

    .liquid-panel {
      min-height: 100svh;
      margin-top: 0;
      padding: clamp(8px, 2svh, 24px) 0;
      display: grid;
      place-items: center;
      opacity: 0;
      transform: translateY(18px);
      transition: opacity 0.56s ease, transform 0.56s ease;
      scroll-snap-align: center;
      scroll-snap-stop: always;
    }

    .details-inner {
      width: min(96vw, 980px);
      margin-inline: auto;
      border-radius: var(--radius);
      border: 1px solid var(--glass-border);
      background: linear-gradient(150deg, rgba(18, 70, 121, 0.44), rgba(11, 52, 96, 0.6));
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px) saturate(130%);
      -webkit-backdrop-filter: blur(14px) saturate(130%);
      padding: 12px;
    }

    .liquid-panel.show {
      opacity: 1;
      transform: translateY(0);
    }

    .map-wrap {
      width: 100%;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid rgba(186, 243, 255, 0.3);
      background: var(--glass-deep);
      box-shadow: inset 0 1px 0 rgba(232, 251, 255, 0.1);
    }

    .map-wrap iframe {
      width: 100%;
      height: 320px;
      border: 0;
      display: block;
      margin-inline: auto;
    }

    .cta {
      margin-top: 12px;
      display: grid;
      gap: 10px;
      grid-template-columns: 1fr;
      width: 100%;
    }

    .calendar-btn,
    .back-btn {
      width: 100%;
      height: 46px;
      border-radius: 14px;
      display: inline-grid;
      place-items: center;
      font-size: 0.96rem;
      font-weight: 700;
      text-decoration: none;
      overflow: hidden;
      position: relative;
    }

    .calendar-btn {
      background: linear-gradient(95deg, #79dcff, #baf9ff 58%, #e4ffff);
      border: none;
      box-shadow: 0 12px 24px rgba(7, 30, 64, 0.25);
    }

    .calendar-btn span {
      background: linear-gradient(90deg, #003f71, #0d6ca0 50%, #166592 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .back-btn {
      border: 1px solid rgba(184, 243, 255, 0.52);
      background: linear-gradient(165deg, rgba(24, 78, 128, 0.56), rgba(15, 54, 99, 0.66));
      box-shadow: inset 0 1px 0 rgba(232, 251, 255, 0.18);
      cursor: pointer;
    }

    .back-btn span {
      background: linear-gradient(90deg, #e7f8ff 0%, #8adfff 52%, #d9f5ff 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .intro-overlay {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: block;
      background: rgba(3, 18, 38, 0.5);
    }

    .intro-stage {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: min(90vw, 420px);
      display: grid;
      justify-items: center;
      gap: 10px;
    }

    .intro-start {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 4;
      width: min(92vw, 460px);
      display: grid;
      justify-items: center;
      gap: 14px;
      text-align: center;
    }

    .intro-open-btn {
      width: min(82vw, 300px);
      min-height: 76px;
      border-radius: 999px;
      border: 2px solid var(--input-border);
      background: var(--input-bg);
      box-shadow: inset 0 1px 0 rgba(214, 248, 255, 0.16), 0 12px 28px rgba(6, 22, 44, 0.34);
      color: #ddf8ff;
      font-size: clamp(1.7rem, 5.8vw, 2.05rem);
      font-weight: 600;
      letter-spacing: 0.22em;
      text-indent: 0.22em;
      cursor: pointer;
      transition: transform 160ms ease, filter 200ms ease;
    }

    .intro-open-btn:hover {
      filter: brightness(1.06);
    }

    .intro-open-btn:active {
      transform: translateY(1px) scale(0.995);
    }

    .intro-open-hint {
      margin: 0;
      font-size: clamp(0.84rem, 2.8vw, 1.02rem);
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #ddf8ff;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.35);
    }

    #envelopeStage {
      z-index: 1;
    }

    #giftboxStage {
      z-index: 2;
    }

    .intro-player {
      width: min(88vw, 360px);
      height: min(88vw, 360px);
      filter: drop-shadow(0 16px 28px rgba(0, 0, 0, 0.46));
    }

    .intro-player.giftbox {
      cursor: pointer;
    }

    .intro-hint {
      margin: 0;
      text-align: center;
      font-size: 0.96rem;
      font-weight: 600;
      color: #ddf8ff;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.35);
    }

    .intro-dialog {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 3;
      width: min(92vw, 380px);
      border-radius: 20px;
      border: 1px solid rgba(186, 243, 255, 0.45);
      background: linear-gradient(148deg, rgba(22, 74, 124, 0.84), rgba(10, 50, 92, 0.86));
      box-shadow: 0 24px 54px rgba(0, 0, 0, 0.42);
      padding: 20px 18px 16px;
      text-align: center;
    }

    .intro-dialog.animate-in {
      animation: introDialogPop 520ms cubic-bezier(0.2, 0.75, 0.2, 1) both;
    }

    .intro-dialog p {
      margin: 0;
      font-size: 1rem;
      font-weight: 600;
      line-height: 1.45;
    }

    .intro-ok {
      margin-top: 14px;
      min-width: 110px;
      height: 44px;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 700;
      color: #052346;
      background: linear-gradient(95deg, #78dcff, #b7f6ff 58%, #ddffff);
      box-shadow: 0 12px 24px rgba(7, 30, 64, 0.3);
    }

    #giftboxStage.animate-in {
      animation: introGiftboxPop 560ms cubic-bezier(0.2, 0.75, 0.2, 1) both;
    }

    @keyframes introDialogPop {
      0% {
        opacity: 0;
        transform: translate(-50%, -45%) scale(0.82);
      }
      65% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1.04);
      }
      100% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
      }
    }

    @keyframes introGiftboxPop {
      0% {
        opacity: 0;
        transform: translate(-50%, -42%) scale(0.86);
      }
      70% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1.03);
      }
      100% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
      }
    }

    @media (min-width: 700px) {
      .page {
        padding: 16px 22px 42px;
      }

      body.invite-centered .page {
        padding: 16px 22px;
      }

      .story-slide {
        min-height: 100svh;
      }

      .map-wrap iframe {
        height: 360px;
      }
    }

    @media (min-width: 1024px) {
      .cta {
        grid-template-columns: 1fr 220px;
        align-items: center;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      html {
        scroll-snap-type: none;
      }
    }
  </style>
  <script type="module" src="https://unpkg.com/@dotlottie/player-component@2.7.12/dist/dotlottie-player.mjs"></script>
</head>
<body>
  <video class="bg-video" autoplay loop muted playsinline>
    <source src="./From KlickPin CF Pin di thismeari su Background video aesthetic _ Bellissimi sfondi Sfondi carini Sfondi - Pin-1970393584146681.mp4" type="video/mp4">
  </video>

  <section id="introOverlay" class="intro-overlay" aria-live="polite">
    <div id="introStartStage" class="intro-start">
      <button id="introStartBtn" class="intro-open-btn" type="button">OPEN</button>
      <p class="intro-open-hint">Chạm để khám phá món quà bất ngờ</p>
    </div>

    <div id="envelopeStage" class="intro-stage hidden">
      <dotlottie-player
        id="envelopeIntro"
        class="intro-player"
        src="./envelop reward opening.lottie"
        background="transparent"
        speed="1"
        autoplay
      ></dotlottie-player>
      <p class="intro-hint">Ấn màn hình để nhận tiền</p>
    </div>

    <div id="introDialog" class="intro-dialog hidden" role="dialog" aria-modal="true" aria-label="Thông báo mở phần quà">
      <p>Nhầm rồi, ấn "Ok" để mở phần quà khác hehe</p>
      <button id="introOkBtn" class="intro-ok" type="button">Ok</button>
    </div>

    <div id="giftboxStage" class="intro-stage hidden">
      <dotlottie-player
        id="giftboxIntro"
        class="intro-player giftbox"
        src="./giftbox open.lottie"
        background="transparent"
        speed="1"
        loop
      ></dotlottie-player>
      <p class="intro-hint">Ấn vào hộp quà để mở phần nhập tên</p>
    </div>
  </section>

  <main class="page">
    <section class="hero hidden" id="heroSection">
      <h1 class="hero-title">Thư mời của Đỗ Quốc Tấn</h1>

      <form id="inviteForm" class="invite-form hidden" novalidate>
        <input id="guestInput" class="input" type="text" placeholder="Nhập họ và tên" autocomplete="off" required />
        <button class="button" type="submit">Mở Thiệp</button>
      </form>

      <p id="errorMessage" class="error" role="status" aria-live="polite"></p>
    </section>

    <section id="revealSection" class="reveal hidden" aria-hidden="true">
      <div id="storyTrack" class="story-track">
        <article class="story-slide">
          <figure class="story-card">
            <img id="slideImage1" alt="Ảnh 1" />
          </figure>
        </article>

        <article class="story-slide">
          <figure class="story-card">
            <img id="slideImage2" alt="Ảnh 2" />
          </figure>
        </article>

        <article class="story-slide">
          <figure class="story-card">
            <img id="slideImage3" alt="Ảnh 3" />
          </figure>
        </article>

        <article class="story-slide">
          <figure class="story-card">
            <img id="slideImage4" alt="Ảnh 4" />
          </figure>
        </article>
      </div>
    </section>

    <section id="detailsSection" class="liquid-panel hidden" aria-hidden="true">
      <div class="details-inner">
        <div class="map-wrap">
          <iframe
            id="mapFrame"
            loading="lazy"
            referrerpolicy="no-referrer-when-downgrade"
            allowfullscreen
            title="Bản đồ địa điểm"
          ></iframe>
        </div>

        <div class="cta">
          <a id="calendarBtn" class="calendar-btn" href="#" target="_blank" rel="noopener noreferrer">
            <span>Thêm vào lịch</span>
          </a>
          <button id="comeBackBtn" class="back-btn" type="button">
            <span>Quay lại</span>
          </button>
        </div>
      </div>
    </section>
  </main>

  <script src="./guest-groups.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

    function buildGuestGroupLookup(guestsMap) {
      const lookup = {};
      Object.entries(guestsMap || {}).forEach(([guestName, groupId]) => {
        const normalizedGuestName = normalizeNameToCode(guestName);
        if (!normalizedGuestName) {
          return;
        }
        lookup[normalizedGuestName] = String(groupId);
      });
      return lookup;
    }

    function normalizeSlideList(rawSlides) {
      if (typeof rawSlides === "string") {
        const trimmed = rawSlides.trim();
        return trimmed ? [trimmed] : null;
      }
      if (!Array.isArray(rawSlides)) {
        return null;
      }

      const cleaned = rawSlides
        .map((item) => (typeof item === "string" ? item.trim() : ""))
        .filter((item) => item.length > 0);

      if (cleaned.length === 0) {
        return null;
      }
      return cleaned;
    }

    function normalizeImagePath(rawPath) {
      if (typeof rawPath !== "string") {
        return null;
      }
      const trimmed = rawPath.trim();
      return trimmed.length > 0 ? trimmed : null;
    }

    function resolveFixedSlides() {
      const fixedSlide1 = normalizeImagePath(fixedSlideConfig && fixedSlideConfig.slide1);
      const fixedSlide3 = normalizeImagePath(fixedSlideConfig && fixedSlideConfig.slide3);
      const fixedSlide4 = normalizeImagePath(fixedSlideConfig && fixedSlideConfig.slide4);
      const fixedFallback = fixedSlide1 || fixedSlide3 || fixedSlide4;

      if (fixedFallback) {
        return {
          slide1: fixedSlide1 || fixedFallback,
          slide3: fixedSlide3 || fixedFallback,
          slide4: fixedSlide4 || fixedFallback,
          fallback: fixedFallback
        };
      }

      const defaultSlides = normalizeSlideList(guestImageGroups[defaultGuestGroupId]);
      if (!defaultSlides) {
        return null;
      }
      const fallback = defaultSlides[0];
      return {
        slide1: defaultSlides[0] || fallback,
        slide3: defaultSlides[2] || fallback,
        slide4: defaultSlides[3] || fallback,
        fallback
      };
    }

    function resolveSlidesByGroupId(groupId) {
      const key = String(groupId || "");
      const slides = normalizeSlideList(guestImageGroups[key]);
      if (!slides) {
        return null;
      }
      // Chỉ lấy một ảnh đại diện của nhóm để gắn vào vị trí ảnh số 2.
      return slides[0] || null;
    }

    function resolveSlidesForGuest(guestName) {
      const normalizedGuestName = normalizeNameToCode(guestName);
      if (!normalizedGuestName) {
        return null;
      }
      const groupId = guestGroupLookup[normalizedGuestName];
      if (!groupId) {
        return null;
      }
      return resolveSlidesByGroupId(groupId);
    }

    function applyGuestSlides(slide2Image) {
      const fallback = fixedSlides && fixedSlides.fallback ? fixedSlides.fallback : slide2Image;
      if (!fallback) {
        return;
      }
      const fixedSlide1 = fixedSlides && fixedSlides.slide1 ? fixedSlides.slide1 : fallback;
      const fixedSlide3 = fixedSlides && fixedSlides.slide3 ? fixedSlides.slide3 : fallback;
      const fixedSlide4 = fixedSlides && fixedSlides.slide4 ? fixedSlides.slide4 : fallback;
      const resolvedSlide2 = slide2Image || fallback;

      setImageWithFallback(slideImage1, fixedSlide1, fallback);
      setImageWithFallback(slideImage2, resolvedSlide2, fallback);
      setImageWithFallback(slideImage3, fixedSlide3, fallback);
      setImageWithFallback(slideImage4, fixedSlide4, fallback);
    }

    function runReveal() {
      clearIntroTimers();
      document.body.classList.remove("invite-centered");
      inviteForm.classList.add("hidden");
      heroSection.classList.add("opened");
      heroSection.classList.add("hidden");

      revealSection.setAttribute("aria-hidden", "false");

      detailsSection.classList.remove("hidden");
      setTimeout(() => detailsSection.classList.add("show"), 140);
      detailsSection.setAttribute("aria-hidden", "false");

      startLiquidFlow();
      requestLiquidTick();
      launchConfetti();

      stopAllAudio();
      backgroundAudio.currentTime = 0;
      safePlay(backgroundAudio);
      shouldResumeBackgroundOnVisible = true;

      revealSection.scrollIntoView({ behavior: "smooth", block: "start" });

    function startLiquidFlow() {
      if (liquidEnabled) {
        return;
      }
      liquidEnabled = true;
      window.addEventListener("scroll", requestLiquidTick, { passive: true });
      window.addEventListener("resize", requestLiquidTick);
    }

    function stopLiquidFlow() {
      if (!liquidEnabled) {
        return;
      }
      liquidEnabled = false;
      window.removeEventListener("scroll", requestLiquidTick);
      window.removeEventListener("resize", requestLiquidTick);
      if (liquidRaf) {
        cancelAnimationFrame(liquidRaf);
        liquidRaf = 0;
      }
    }

    function requestLiquidTick() {
      if (!liquidEnabled || liquidRaf) {
        return;
      }
      liquidRaf = requestAnimationFrame(() => {
        liquidRaf = 0;
        updateStoryMorph();
      });
    }

    function updateStoryMorph() {
      if (revealSection.classList.contains("hidden")) {
        return;
      }

      const vh = window.innerHeight || 1;

      storySlides.forEach((slide, index) => {
        const card = storyCards[index];
        if (!card) {
          return;
        }

        const rect = slide.getBoundingClientRect();
        const center = rect.top + rect.height / 2;
        let progress = (center - vh * 0.5) / (vh * 0.52);
        progress = Math.max(-1.2, Math.min(1.2, progress));

        const abs = Math.min(1, Math.abs(progress));
        const scaleX = 1 - abs * 0.18;
        const scaleY = 1 - abs * 0.28;
        const translateY = progress < 0 ? -abs * 16 : abs * 7;
        const opacity = 1 - abs * 0.24;
        const radius = Math.round(24 + abs * 12);

        card.style.transform = `translate3d(0, ${translateY}vh, 0) scale(${scaleX.toFixed(3)}, ${scaleY.toFixed(3)})`;
        card.style.opacity = opacity.toFixed(3);
        card.style.borderRadius = `${radius}px`;

        slide.classList.toggle("is-active", abs < 0.24);
      });
    }

    function resetStoryMorph() {
      storySlides.forEach((slide, index) => {
        const card = storyCards[index];
        slide.classList.remove("is-active");
        if (!card) {
          return;
        }
        card.style.transform = "";
        card.style.opacity = "";
        card.style.borderRadius = "";
      });
    }

    function launchConfetti() {
      if (typeof confetti !== "function") {
        return;
      }

      const end = Date.now() + 1600;
      const colors = ["#52cfff", "#8ce9ff", "#ffffff", "#aaf5ff"];

      (function frame() {
        confetti({
          particleCount: 8,
          angle: 60,
          spread: 78,
          origin: { x: 0 },
          colors
        });
        confetti({
          particleCount: 8,
          angle: 120,
          spread: 78,
          origin: { x: 1 },
          colors
        });

        if (Date.now() < end) {
          requestAnimationFrame(frame);
        }
      })();
    }

    function stopAllAudio() {
      backgroundAudio.pause();
      backgroundAudio.currentTime = 0;

      if (backClickAudio) {
        backClickAudio.pause();
        backClickAudio.currentTime = 0;
      }
    }

    function handleVisibilityAudio() {
      if (document.hidden) {
        const revealIsVisible = !revealSection.classList.contains("hidden");
        shouldResumeBackgroundOnVisible = revealIsVisible && !backgroundAudio.paused;
        backgroundAudio.pause();
        if (backClickAudio) {
          backClickAudio.pause();
        }
        return;
      }

      if (shouldResumeBackgroundOnVisible && !revealSection.classList.contains("hidden")) {
        safePlay(backgroundAudio);
      }
    }

    function handleUserAudioResume() {
      if (document.hidden || revealSection.classList.contains("hidden")) {
        return;
      }
      if (shouldResumeBackgroundOnVisible && backgroundAudio.paused) {
        safePlay(backgroundAudio);
      }
    }

    function handlePageExitAudio() {
      stopAllAudio();
    }

    function safePlay(audio) {
      audio.play().catch(() => {
        // Một số trình duyệt có thể chặn autoplay ngoài tương tác người dùng.
      });
    }

    function restartIntroAnimation(element, className) {
      element.classList.remove(className);
      // Force reflow để animation được phát lại khi cùng một class được thêm lại.
      void element.offsetWidth;
      element.classList.add(className);
    }

    function playBackClickVoice() {
      if (!backClickAudio) {
        return;
      }
      backClickAudio.pause();
      backClickAudio.currentTime = 0;
      safePlay(backClickAudio);
    }

    function safePlayLottie(player) {
      if (!player) {
        return;
      }
      if (typeof player.stop === "function") {
        player.stop();
      }
      if (typeof player.play === "function") {
        player.play();
      }
    }

    function setImageWithFallback(imageEl, src, fallback) {
      imageEl.onerror = () => {
        if (imageEl.dataset.fallbackTried === "1") {
          return;
        }
        imageEl.dataset.fallbackTried = "1";
        imageEl.src = fallback;
      };
      imageEl.src = src;
    }

    function setupKeyboardGuard() {
      const onFocus = () => {
        setTimeout(() => {
          guestInput.scrollIntoView({ block: "center", inline: "nearest", behavior: "smooth" });
        }, 140);
      };

      const onBlur = () => {
        document.body.classList.remove("keyboard-open");
      };

      guestInput.addEventListener("focus", onFocus);
      guestInput.addEventListener("blur", onBlur);

      if (!window.visualViewport) {
        return;
      }

      const updateKeyboardState = () => {
        const viewportHeight = window.visualViewport.height;
        const keyboardLikelyOpen = viewportHeight < window.innerHeight * 0.8;
        document.body.classList.toggle("keyboard-open", keyboardLikelyOpen);

        if (keyboardLikelyOpen && document.activeElement === guestInput) {
          guestInput.scrollIntoView({ block: "center", inline: "nearest", behavior: "smooth" });
        }
      };

      window.visualViewport.addEventListener("resize", updateKeyboardState);
      window.visualViewport.addEventListener("scroll", updateKeyboardState);
    }

    function normalizeNameToCode(text) {
      return text
        .trim()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/đ/g, "d")
        .replace(/Đ/g, "d")
        .replace(/[^a-zA-Z0-9]/g, "")
        .toLowerCase();
    }

    function buildGoogleCalendarUrl(eventData) {
      const baseUrl = "https://calendar.google.com/calendar/render?action=TEMPLATE";
      const start = formatCalendarDate(eventData.start);
      const end = formatCalendarDate(eventData.end);
      const params = new URLSearchParams({
        text: eventData.title,
        details: eventData.description,
        location: eventData.location,
        dates: `${start}/${end}`
      });
      return `${baseUrl}&${params.toString()}`;
    }

    function formatCalendarDate(isoString) {
      const d = new Date(isoString);
      return d.toISOString().replace(/[-:]/g, "").split(".")[0] + "Z";
    }

    function showError(message) {
      errorMessage.textContent = message;
    }

    function clearError() {
      errorMessage.textContent = "";
    }
  </script>
</body>
</html>
